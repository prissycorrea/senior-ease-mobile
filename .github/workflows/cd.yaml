name: CD - Continuous Delivery

on:
  push:
    branches:
      - main
      - development

env:
  CI: true
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "27.1.12297006"

jobs:
  quality-checks:
    name: Expo checks before build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint project
        run: npm run lint

      - name: Run unit tests
        run: npm run test:ci

  build-development:
    name: Android debug APK (Gradle) — development
    needs: quality-checks
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project (Expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-development
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-production:
    name: Android release AAB (Gradle) — main
    needs: quality-checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk: ${{ env.ANDROID_NDK_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project (Expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Build release AAB
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-main
          path: android/app/build/outputs/bundle/release/app-release.aab
