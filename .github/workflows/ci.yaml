name: CI - Continuous Integration

on:
  pull_request:

jobs:
  quality-checks:
    name: Expo Mobile CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint project
        run: npm run lint

      - name: Run unit tests
        run: npm run test:ci

      - name: Validate Expo Android prebuild
        run: npx expo prebuild --platform android --no-install --non-interactive
